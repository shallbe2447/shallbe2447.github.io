<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contract Filler</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #fff; color: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .border-black-thick { border: 2px solid #000; }
        .status-badge { background-color: #000; color: #fff; border-radius: 12px; padding: 2px 12px; font-size: 10px; font-weight: bold; }
        .input-box { border: 1px solid #000; border-radius: 0px; padding: 8px; width: 100%; outline: none; font-size: 13px; }
        .btn-black { background-color: #000; color: #fff; padding: 8px 16px; font-weight: bold; font-size: 13px; transition: opacity 0.2s; }
        .btn-white { background-color: #fff; color: #000; border: 1px solid #000; padding: 8px 16px; font-size: 13px; }
    </style>
</head>
<body class="p-3">
    <div class="flex items-center gap-3 mb-6">
        <div class="bg-black p-2 rounded text-white">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
        </div>
        <div>
            <h1 class="font-bold text-sm">Contract Filler</h1>
            <p class="text-[10px] text-gray-500">Автоматическое заполнение договоров</p>
        </div>
    </div>

    <div class="border-black-thick p-4 mb-4">
        <div class="flex items-center gap-2 mb-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            <h2 class="font-bold text-xs uppercase">Вставьте данные клиента</h2>
        </div>
        <textarea id="rawText" class="w-full h-40 border border-black p-2 text-xs mb-3 font-mono" placeholder="ИИН, ФИО, Класс..."></textarea>
        <div class="flex gap-2">
            <button onclick="fillExample()" class="btn-white flex items-center gap-1">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg> Пример
            </button>
            <button onclick="extractData()" class="btn-black">Извлечь данные</button>
        </div>
    </div>

    <div class="border-black-thick p-4 mb-20">
        <div class="flex justify-between items-center mb-4">
            <div class="flex items-center gap-2">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                <h2 class="font-bold text-xs uppercase">Проверка данных</h2>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-24 h-2 bg-gray-200 rounded-full"><div id="progress" class="w-0 h-full bg-black rounded-full transition-all"></div></div>
                <span id="percent" class="text-[10px] font-bold">0%</span>
            </div>
        </div>

        <div id="fieldsContainer" class="space-y-3">
            </div>
    </div>

    <div class="fixed bottom-0 left-0 w-full p-3 bg-white border-t border-black flex gap-2">
        <button onclick="sendToTelegram()" class="flex-grow btn-black flex items-center justify-center gap-2 py-4">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            В TELEGRAM
        </button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const fieldNames = [
            "ФИО Ребенка", "Класс", "ИИН ребенка", "ФИО Родителя", "ИИН родителя",
            "Адрес проживания", "Номер телефона", "№ удостоверения", "Кем/когда выдано",
            "Email", "Первый платеж", "Ежемесячный платеж", "День договора", "Крайний срок оплаты"
        ];

        // Инициализация полей
        const container = document.getElementById('fieldsContainer');
        fieldNames.forEach((name, i) => {
            container.innerHTML += `
                <div class="flex items-center border-b border-gray-200 pb-2 gap-2">
                    <span class="text-[10px] text-gray-400 w-4">${i+1}</span>
                    <span class="text-[11px] font-medium w-1/3">${name}</span>
                    <input type="text" id="f${i}" class="input-box flex-grow h-7" oninput="updateStatus()">
                    <div id="s${i}" class="opacity-0 status-badge">OK</div>
                </div>
            `;
        });

        function fillExample() {
            document.getElementById('rawText').value = "Иванова Мария Петровна\n7\n010203456789\nИванова Анна Сергеевна\n890102345678\nг. Алматы, ул. Абая 10\n87071234567\n012345678\n15.03.2020 МВД РК\nivanova@mail.com\n150000\n50000\n12\n15";
            extractData();
        }

        function extractData() {
            const text = document.getElementById('rawText').value;
            const lines = text.split('\n').filter(l => l.trim() !== "");
            lines.forEach((line, i) => {
                if(i < 14) {
                    const input = document.getElementById('f' + i);
                    input.value = line.trim();
                }
            });
            updateStatus();
        }

        function updateStatus() {
            let filled = 0;
            for(let i=0; i<14; i++) {
                const val = document.getElementById('f' + i).value;
                const badge = document.getElementById('s' + i);
                if(val.length > 0) {
                    badge.classList.replace('opacity-0', 'opacity-100');
                    filled++;
                } else {
                    badge.classList.replace('opacity-100', 'opacity-0');
                }
            }
            const prg = Math.round((filled / 14) * 100);
            document.getElementById('progress').style.width = prg + '%';
            document.getElementById('percent').innerText = prg + '%';
        }

        function sendToTelegram() {
            let result = [];
            for (let i = 0; i < 14; i++) {
                let val = document.getElementById('f' + i).value;
                if (!val) { tg.showAlert('Заполните все поля!'); return; }
                result.push(val);
                if (i === 11) result.push("Авторасчет"); // Вставляем 13-й пункт как в боте
            }
            tg.sendData(JSON.stringify(result));
        }
    </script>
</body>
</html>
