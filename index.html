<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contract Filler</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #fff; color: #000; font-family: sans-serif; }
        .border-black-thick { border: 2px solid #000; }
        .status-badge { background-color: #000; color: #fff; border-radius: 12px; padding: 2px 12px; font-size: 10px; font-weight: bold; }
        .input-box { border: 1px solid #000; padding: 8px; width: 100%; outline: none; font-size: 13px; }
        .btn-black { background-color: #000; color: #fff; padding: 10px 20px; font-weight: bold; }
    </style>
</head>
<body class="p-4">
    <div class="flex items-center gap-3 mb-6">
        <div class="bg-black text-white p-2 rounded">📄</div>
        <div><h1 class="font-bold text-sm">Contract Filler</h1><p class="text-[10px] text-gray-400">Автозаполнение договоров</p></div>
    </div>

    <div class="border-black-thick p-4 mb-4">
        <h2 class="font-bold text-xs uppercase mb-3">Вставьте данные клиента</h2>
        <textarea id="rawText" class="w-full h-40 border border-black p-2 text-xs mb-3 font-mono" placeholder="ИИН, ФИО..."></textarea>
        <div class="flex gap-2">
            <button onclick="extractData()" class="btn-black w-full">Извлечь данные</button>
        </div>
    </div>

    <div class="border-black-thick p-4 mb-24">
        <div class="flex justify-between items-center mb-4">
            <h2 class="font-bold text-xs uppercase">Проверка данных</h2>
            <span id="percent" class="text-[10px] font-bold">0%</span>
        </div>
        <div id="fieldsContainer" class="space-y-3"></div>
    </div>

    <div class="fixed bottom-0 left-0 w-full p-3 bg-white border-t border-black">
        <button onclick="sendToTelegram()" class="w-full btn-black py-4">В TELEGRAM</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const fieldNames = [
            "ФИО Ребенка", "Класс", "ИИН ребенка", "ФИО Родителя", "ИИН родителя",
            "Адрес проживания", "Номер телефона", "№ удостоверения", "Кем/когда выдано",
            "Email", "Первый платеж", "Ежемесячный платеж", "День договора", "Срок оплаты"
        ];

        const container = document.getElementById('fieldsContainer');
        fieldNames.forEach((name, i) => {
            container.innerHTML += `
                <div class="flex items-center border-b border-gray-100 pb-2 gap-2">
                    <span class="text-[11px] w-32">${name}</span>
                    <input type="text" id="f${i}" class="input-box flex-grow h-7" oninput="updateStatus()">
                    <div id="s${i}" class="opacity-0 status-badge">OK</div>
                </div>`;
        });

        function extractData() {
            const text = document.getElementById('rawText').value;
            const lines = text.split('\n').filter(l => l.trim() !== "");
            lines.forEach((line, i) => {
                if(i < 14) document.getElementById('f' + i).value = line.replace(/^\d+[\s.)]+/, "").trim();
            });
            updateStatus();
        }

        function updateStatus() {
            let filled = 0;
            for(let i=0; i<14; i++) {
                if(document.getElementById('f' + i).value.length > 0) {
                    document.getElementById('s' + i).classList.replace('opacity-0', 'opacity-100');
                    filled++;
                } else {
                    document.getElementById('s' + i).classList.replace('opacity-100', 'opacity-0');
                }
            }
            document.getElementById('percent').innerText = Math.round((filled / 14) * 100) + '%';
        }

        function sendToTelegram() {
            let res = [];
            for (let i = 0; i < 14; i++) {
                let v = document.getElementById('f' + i).value;
                if (!v) { tg.showAlert('Заполните всё!'); return; }
                res.push(v);
                if (i === 11) res.push("Авторасчет");
            }
            tg.sendData(JSON.stringify(res));
        }
    </script>
</body>
</html>
